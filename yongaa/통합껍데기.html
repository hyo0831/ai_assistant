<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORION AI - 주도주 사냥꾼</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        
        /* React Animate-in Polyfill */
        .animate-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 아이콘 컴포넌트 래퍼 (Lucide 사용을 위함)
        const Icon = ({ name, className }) => {
            const [ref, setRef] = React.useState(null);
            React.useEffect(() => {
                if (ref) lucide.createIcons({ targets: [ref] });
            }, [ref, name]);
            return <i ref={setRef} data-lucide={name} className={className}></i>;
        };

        // --- 서브 컴포넌트: 분석 모드 내용 ---
        const AnalysisView = () => {
            const [tab, setTab] = useState('종합');
            
            return (
                <div className="space-y-6 animate-in">
                    <div className="flex gap-2 border-b border-slate-200 pb-1">
                        {['종합', '상세분석', 'CAN SLIM 스코어카드'].map(t => (
                            <button 
                                key={t}
                                onClick={() => setTab(t)}
                                className={`px-6 py-2 text-sm font-bold rounded-t-lg transition-all ${tab === t ? 'text-indigo-600 border-b-2 border-indigo-600 bg-indigo-50/50' : 'text-slate-400 hover:text-slate-600'}`}
                            >
                                {t}
                            </button>
                        ))}
                    </div>

                    <div className="min-h-[500px]">
                        {tab === '종합' && (
                            <div className="grid grid-cols-12 gap-6">
                                <div className="col-span-8 space-y-6">
                                    <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                                        <h4 className="font-bold flex items-center gap-2 mb-4 text-rose-600"><Icon name="alert-triangle" className="w-5 h-5"/> 추세 및 거래량 경고</h4>
                                        <div className="space-y-3">
                                            <div className="p-3 bg-slate-50 rounded-xl text-sm font-medium text-slate-700">🔴 10주 이평선 이탈: 대량 거래를 동반한 하향 돌파</div>
                                            <div className="p-3 bg-slate-50 rounded-xl text-sm font-medium text-slate-700">🔴 매도세 집중: 최근 25일 중 5일 분산일 발생</div>
                                        </div>
                                    </div>
                                    <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                                        <h4 className="font-bold flex items-center gap-2 mb-4 text-indigo-600"><Icon name="history" className="w-5 h-5"/> 과거 패턴 맥락</h4>
                                        <div className="h-24 bg-slate-50 rounded-xl flex items-center justify-center text-slate-400 text-sm text-center px-4">
                                            [타임라인 시각화 영역: 컵 생성 후 핸들 돌파 실패 및 하락 전환 패턴]
                                        </div>
                                    </div>
                                </div>
                                <div className="col-span-4 space-y-6">
                                    <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm text-center">
                                        <h4 className="font-bold mb-4 text-slate-700">RS 성과</h4>
                                        <div className="w-32 h-32 rounded-full border-[12px] border-slate-100 border-t-rose-500 mx-auto mb-4 flex items-center justify-center">
                                            <span className="text-3xl font-black text-slate-800">47</span>
                                        </div>
                                        <span className="bg-rose-100 text-rose-600 px-3 py-1 rounded-full text-xs font-bold">심각한 후발주</span>
                                    </div>
                                    <div className="bg-slate-800 text-white p-6 rounded-2xl shadow-lg">
                                        <h4 className="font-bold mb-4 flex items-center gap-2 text-slate-200"><Icon name="shield-alert" className="w-4 h-4 text-rose-400"/> 리스크 관리</h4>
                                        <div className="mb-2 text-xs text-slate-400">8% 손절가 권장</div>
                                        <div className="text-2xl font-black mb-4">$235.32</div>
                                        <button className="w-full bg-rose-600 py-2 rounded-lg text-sm font-bold hover:bg-rose-700 transition-colors">매도 알림 설정</button>
                                    </div>
                                </div>
                            </div>
                        )}

                                    <div className="text-sm text-slate-400 font-bold tracking-widest mb-6 uppercase">Total Score</div>
                                    <div className="bg-rose-50 text-rose-600 font-bold py-2 rounded-xl">Grade: C (Poor)</div>
                                </div>
                                <div className="col-span-8 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">

                                            <div key={char} className="flex items-center gap-4 p-3 hover:bg-slate-50 rounded-lg transition-colors">

                                                <div className="flex-1 h-2 bg-slate-100 rounded-full overflow-hidden">
                                                    <div className={`h-full ${idx < 2 ? 'bg-emerald-500' : 'bg-rose-500'}`} style={{width: `${idx < 2 ? 85 - (idx*10) : 30 + (idx*5)}%`}}></div>
                                                </div>
                                                <span className={`text-xs font-bold w-12 text-right ${idx < 2 ? 'text-emerald-600' : 'text-rose-500'}`}>{idx < 2 ? 'PASS' : 'FAIL'}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const App = () => {

                                </div>
                            </div>
                        </div>

                        <div onClick={() => setCurrentScreen('menu2')} className="group bg-white p-8 rounded-[32px] border border-slate-200 shadow-sm hover:shadow-xl hover:border-emerald-300 transition-all cursor-pointer relative overflow-hidden">
                            <div className="relative z-10">
                                <div className="w-14 h-14 bg-emerald-600 rounded-2xl flex items-center justify-center mb-6 shadow-lg text-white">
                                    <Icon name="cpu" className="w-7 h-7" />
                                </div>
                                <h3 className="text-2xl font-bold text-slate-900 mb-2">AI 티칭 머신</h3>
                                <p className="text-slate-500 text-sm leading-relaxed mb-6">자신만의 매매 기록을 학습시켜 개인 맞춤형 AI를 구축합니다.</p>
                                <div className="flex items-center text-emerald-600 font-bold text-sm">
                                    봇 빌더 시작 <Icon name="arrow-right" className="w-4 h-4 ml-1 group-hover:translate-x-1 transition-transform"/>
                                </div>
                            </div>
                        </div>

                        <div onClick={() => setCurrentScreen('menu3')} className="group bg-white p-8 rounded-[32px] border border-slate-200 shadow-sm hover:shadow-xl hover:border-amber-300 transition-all cursor-pointer relative overflow-hidden">
                            <div className="relative z-10">
                                <div className="w-14 h-14 bg-amber-500 rounded-2xl flex items-center justify-center mb-6 shadow-lg text-white">
                                    <Icon name="search" className="w-7 h-7" />

                                <h3 className="text-2xl font-bold text-slate-900 mb-2">AI 스크리너</h3>
                                <p className="text-slate-500 text-sm leading-relaxed mb-6">자연어 질문만으로 조건에 맞는 급등주를 즉시 찾아냅니다.</p>
                                <div className="flex items-center text-amber-600 font-bold text-sm">

                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const LibraryScreen = () => (
                <div className="max-w-7xl mx-auto px-6 py-8 animate-in">
                    <button onClick={() => setCurrentScreen('home')} className="flex items-center text-slate-400 hover:text-slate-900 mb-6 font-bold text-sm transition-colors">
                        <Icon name="chevron-left" className="w-4 h-4 mr-1"/> 메인으로
                    </button>
                    <div className="text-center mb-12">
                        <h2 className="text-3xl font-black text-slate-900 mb-2">Expert Library</h2>
                        <p className="text-slate-500">당신의 투자 성향에 맞는 거장의 AI를 선택하세요.</p>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                        {[
                            { name: "William O'Neil", style: "CAN SLIM & Momentum", color: "bg-[#0A2647] text-white", accent: "text-amber-400" },
                            { name: "Warren Buffett", style: "Value & Long-term", color: "bg-[#1C315E] text-white", accent: "text-blue-200" },
                            { name: "Jim Simons", style: "Quant & Mathematical", color: "bg-[#2D4263] text-white", accent: "text-emerald-200" }
                        ].map((bot, i) => (
                            <div key={i} onClick={() => setCurrentScreen('menu1-trading')} className={`aspect-[3/4] rounded-[32px] p-8 flex flex-col justify-between cursor-pointer hover:scale-[1.02] transition-all shadow-2xl relative overflow-hidden ${bot.color}`}>
                                <div className="absolute top-0 right-0 p-6 opacity-10"><Icon name="bot" className="w-32 h-32"/></div>
                                <div>
                                    <div className="w-12 h-1 bg-white/30 mb-6 rounded-full"></div>
                                    <h3 className="text-3xl font-black leading-tight mb-2 tracking-tight">{bot.name}</h3>
                                    <p className={`text-sm font-bold uppercase tracking-widest ${bot.accent}`}>{bot.style}</p>
                                </div>
                                <button className="bg-white/10 backdrop-blur-md border border-white/20 text-white py-4 rounded-2xl font-bold hover:bg-white hover:text-slate-900 transition-all shadow-xl">
                                    AI 봇 가동하기
                                </button>
                            </div>
                        ))}
                    </div>
                </div>
            );

            const BotWorkspace = () => (
                <div className="flex h-[calc(100vh-64px)] bg-slate-50 overflow-hidden">
                    <aside className="w-20 bg-white border-r border-slate-200 flex flex-col items-center py-6 gap-6 shrink-0">

                        </div>
                    </aside>
                    <div className="flex-1 flex flex-col min-w-0">
                        <div className="h-16 border-b border-slate-200 bg-white flex items-center justify-between px-6 shrink-0">
                            <div className="flex items-center gap-4">
                                <div>
                                    <h2 className="text-lg font-black text-slate-900 flex items-center gap-2">
                                        William O'Neil Bot <span className="bg-emerald-100 text-emerald-600 text-[10px] px-2 py-0.5 rounded-full font-bold">LIVE</span>
                                    </h2>
                                    <p className="text-xs text-slate-400 font-bold uppercase tracking-tighter">CAN SLIM Growth Strategy</p>

                            </div>

                                </button>
                            </div>
                        </div>
                        <div className="flex-1 overflow-y-auto p-6">
                            {tradingMode === 'trading' ? (
                                <div className="h-full flex flex-col gap-6 animate-in">
                                    <div className="flex-1 bg-white rounded-[32px] border border-slate-200 shadow-sm flex items-center justify-center relative overflow-hidden group">
                                        <div className="text-center relative z-10">
                                            <Icon name="line-chart" className="w-10 h-10 text-slate-300 mx-auto mb-4"/>

                                    <div className="h-64 grid grid-cols-3 gap-6 shrink-0">

                                                <h4 className="font-bold text-slate-900">Quick Order Panel</h4>
                                            </div>
                                            <div className="flex gap-6 h-12">
                                                <button className="flex-1 bg-rose-50 text-rose-600 py-3 rounded-2xl font-black border border-rose-100">SELL</button>
                                                <button className="flex-1 bg-emerald-50 text-emerald-600 py-3 rounded-2xl font-black border border-emerald-100">BUY</button>

                            </div>
                        </div>
                        <div className="col-span-7 bg-white rounded-[40px] border border-slate-200 p-10">
                            <h3 className="font-black text-2xl text-slate-900 mb-8">실시간 스캔 결과</h3>
                            <div className="space-y-4">
                                {[{t:"TSLA", n:"Tesla Inc.", p:"$242.60", c:"+4.2%"}, {t:"NVDA", n:"NVIDIA", p:"$124.50", c:"+1.8%"}].map((s,i)=>(
                                    <div key={i} className="flex items-center justify-between p-5 bg-white rounded-[24px] border border-slate-100 shadow-sm">
                                        <div className="font-black">{s.t}</div>
                                        <div className="font-black text-emerald-500">{s.c}</div>

                </div>
            );

            return (
                <div className="min-h-screen bg-[#F8FAFC] text-slate-900">
                    <Header />
                    <main>
                        {currentScreen === 'home' && <HomeScreen />}
                        {currentScreen === 'menu1' && <LibraryScreen />}
                        {(currentScreen === 'menu1-trading' || currentScreen === 'menu1-analysis') && <BotWorkspace />}
                        {currentScreen === 'menu2' && <TeachingScreen />}
                        {currentScreen === 'menu3' && <ScreenerScreen />}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
