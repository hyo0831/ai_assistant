<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O'Neil AI - 투자 어시스턴트</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>O'Neil AI</h1>
        <p class="subtitle">CAN SLIM 방법론 기반 주식 차트 분석</p>
    </header>

    <main>
        <!-- 입력 섹션 -->
        <section class="input-section">
            <div class="input-group">
                <label for="ticker">종목 코드</label>
                <input type="text" id="ticker" placeholder="예: AAPL, MSFT, 005930.KS" autofocus>
            </div>

            <div class="options-row">
                <div class="input-group">
                    <label for="mode">분석 모드</label>
                    <select id="mode">
                        <option value="v2">V2 - 패턴 감지 + AI (추천)</option>
                        <option value="v1">V1 - 기본 AI 분석</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="interval">차트 간격</label>
                    <select id="interval">
                        <option value="1wk">주봉 (Weekly)</option>
                        <option value="1d">일봉 (Daily)</option>
                    </select>
                </div>
            </div>

            <button id="analyze-btn" onclick="analyzeStock()">분석 시작</button>
        </section>

        <!-- 로딩 -->
        <section id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>AI가 차트를 분석 중입니다... (30~60초 소요)</p>
        </section>

        <!-- 에러 -->
        <div id="error" class="error hidden"></div>

        <!-- 결과 섹션 -->
        <section id="result" class="result-section hidden">
            <!-- 패턴 요약 카드 -->
            <div id="pattern-cards" class="pattern-cards"></div>

            <!-- 차트 이미지 -->
            <div id="chart-container" class="chart-container"></div>

            <!-- AI 분석 텍스트 -->
            <div id="analysis" class="analysis"></div>

            <!-- 타임스탬프 -->
            <p id="timestamp" class="timestamp"></p>
        </section>
    </main>

    <footer>
        <p>William O'Neil CAN SLIM Methodology &middot; Powered by Gemini AI</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
