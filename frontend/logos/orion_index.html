<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Invest Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #fafbfc; }
        .animate-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass-header { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); }
    </style>
</head>
<body class="text-slate-900">

    <!-- API 설정 바 (최상단) -->
    <div class="bg-indigo-900 text-white px-6 py-2 flex items-center justify-between text-xs">
        <div class="flex items-center gap-4">
            <span class="font-bold">시스템 설정</span>
            <div class="flex items-center gap-2">
                <label for="api-key">Gemini API Key:</label>
                <input type="password" id="api-key" class="bg-indigo-800 border border-indigo-700 rounded px-2 py-1 text-white outline-none focus:ring-1 focus:ring-indigo-400 w-48" placeholder="API 키를 입력하세요">
                <button onclick="saveApiKey()" class="bg-indigo-600 hover:bg-indigo-500 px-2 py-1 rounded transition-all">저장</button>
            </div>
        </div>
        <div id="status-msg" class="text-indigo-300">API 키가 설정되지 않았습니다.</div>
    </div>

    <!-- Google-Style Header -->
    <header class="sticky top-0 z-[100] bg-white border-b border-slate-200 px-6 py-4 glass-header">
        <div class="max-w-[1400px] mx-auto flex items-center justify-between">
            <div class="flex items-center gap-10">
                <div class="flex items-center gap-2 cursor-pointer" onclick="navigate('홈')">
                    <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center shadow-lg shadow-indigo-100">
                        <i data-lucide="trending-up" class="text-white w-5 h-5"></i>
                    </div>
                    <span class="text-xl font-bold tracking-tighter text-slate-900">AI-INVEST</span>
                </div>
                
                <nav class="hidden lg:flex items-center gap-1">
                    <button onclick="navigate('홈')" class="nav-item px-5 py-2 rounded-full text-sm font-bold transition-all bg-indigo-50 text-indigo-600" data-page="홈">홈</button>
                    <button onclick="navigate('커뮤')" class="nav-item px-5 py-2 rounded-full text-sm font-bold transition-all text-slate-500 hover:bg-slate-50" data-page="커뮤">커뮤</button>
                    <button onclick="navigate('커스텀AI')" class="nav-item px-5 py-2 rounded-full text-sm font-bold transition-all text-slate-500 hover:bg-slate-50" data-page="커스텀AI">커스텀AI</button>
                    <button onclick="navigate('자동매매')" class="nav-item px-5 py-2 rounded-full text-sm font-bold transition-all text-slate-500 hover:bg-slate-50" data-page="자동매매">자동매매</button>
                    <button onclick="navigate('종목스크리너')" class="nav-item px-5 py-2 rounded-full text-sm font-bold transition-all text-slate-500 hover:bg-slate-50" data-page="종목스크리너">종목스크리너</button>
                </nav>
            </div>

            <div class="flex items-center gap-3">
                <div class="hidden md:flex items-center bg-slate-100 rounded-full px-4 py-2 w-64 border border-transparent focus-within:bg-white focus-within:border-slate-200 transition-all">
                    <i data-lucide="search" class="w-4 h-4 text-slate-400"></i>
                    <input class="bg-transparent border-none outline-none px-3 text-sm w-full" placeholder="검색...">
                </div>
                <button class="p-2.5 text-slate-400 hover:bg-slate-100 rounded-full transition-all relative">
                    <i data-lucide="bell" class="w-5 h-5"></i>
                    <span class="absolute top-2 right-2 w-2 h-2 bg-rose-500 rounded-full border-2 border-white"></span>
                </button>
                <div class="w-9 h-9 bg-indigo-100 rounded-full flex items-center justify-center border border-indigo-200 ml-2">
                    <i data-lucide="user" class="w-5 h-5 text-indigo-600"></i>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main id="content" class="min-h-[calc(100vh-140px)] p-6 md:p-10 animate-in">
        <!-- 콘텐츠는 자바스크립트에 의해 렌더링됩니다 -->
    </main>

    <!-- Footer -->
    <footer class="border-t border-slate-200 bg-white py-12 px-6 mt-12">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="flex items-center gap-2 opacity-50">
                <div class="w-6 h-6 bg-slate-900 rounded flex items-center justify-center text-white">
                    <i data-lucide="trending-up" class="w-3 h-3"></i>
                </div>
                <span class="text-sm font-bold">AI-INVEST HUB</span>
            </div>
            <div class="flex gap-8 text-sm font-bold text-slate-400">
                <a href="#" class="hover:text-indigo-600">서비스 약관</a>
                <a href="#" class="hover:text-indigo-600">개인정보처리방침</a>
                <a href="#" class="hover:text-indigo-600">고객지원</a>
            </div>
            <p class="text-xs text-slate-400">© 2024 AI-Invest. All rights reserved.</p>
        </div>
    </footer>

    <!-- 모달 컨테이너 -->
    <div id="modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[200] hidden items-center justify-center p-4">
        <div class="bg-white rounded-3xl max-w-lg w-full p-10 shadow-2xl relative border border-slate-100">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-slate-400 hover:text-slate-900">✕</button>
            <div id="modal-content"></div>
        </div>
    </div>

    <script>
        let currentPage = '홈';
        let apiKey = '';

        function saveApiKey() {
            apiKey = document.getElementById('api-key').value;
            const statusMsg = document.getElementById('status-msg');
            if(apiKey) {
                statusMsg.innerText = "API 키가 성공적으로 설정되었습니다.";
                statusMsg.classList.replace('text-indigo-300', 'text-emerald-400');
            } else {
                statusMsg.innerText = "API 키가 설정되지 않았습니다.";
                statusMsg.classList.replace('text-emerald-400', 'text-indigo-300');
            }
        }

        const masterBots = [
            { id: 1, name: "워렌 버핏 AI", philosophy: "가치 투자", color: "bg-indigo-600", description: "내재 가치보다 낮은 가격의 주식을 찾습니다." },
            { id: 2, name: "레이 달리오 AI", philosophy: "올웨더", color: "bg-violet-600", description: "모든 경제 상황에서 생존하는 전략을 제안합니다." },
            { id: 3, name: "피터 린치 AI", philosophy: "생활 투자", color: "bg-purple-600", description: "일상에서 발견하는 텐배거 주식을 추천합니다." },
            { id: 4, name: "짐 로저스 AI", philosophy: "원자재", color: "bg-fuchsia-600", description: "글로벌 시장의 흐름과 원자재의 미래를 분석합니다." },
            { id: 5, name: "조지 소로스 AI", philosophy: "재귀성", color: "bg-blue-600", description: "시장의 불균형과 투기적 기회를 포착합니다." },
            { id: 6, name: "찰리 멍거 AI", philosophy: "격자모델", color: "bg-slate-700", description: "다학제적 접근으로 비즈니스를 평가합니다." },
        ];

        const marketBots = [
            { id: 1, title: "단타 신강림 - 5분봉 스캘핑 AI 봇", creator: "불타는계좌", yield: "+15.4%", category: "스캘핑", sentiment: 88, price: "1.2 ETH" },
            { id: 2, title: "나스닥 헷지마스터 - 변동성 방어 AI", creator: "안전제일", yield: "+2.1%", category: "헷지", sentiment: 62, price: "0.5 ETH" },
            { id: 3, title: "K-주식 우량주 분석기 V2", creator: "국대개미", yield: "-4.2%", category: "분석", sentiment: 45, price: "0.2 ETH" }
        ];

        function navigate(page) {
            currentPage = page;
            const content = document.getElementById('content');
            content.className = "min-h-[calc(100vh-140px)] p-6 md:p-10 animate-in";
            
            // 네비게이션 스타일 업데이트
            document.querySelectorAll('.nav-item').forEach(el => {
                if(el.dataset.page === page) {
                    el.className = "nav-item px-5 py-2 rounded-full text-sm font-bold transition-all bg-indigo-50 text-indigo-600";
                } else {
                    el.className = "nav-item px-5 py-2 rounded-full text-sm font-bold transition-all text-slate-500 hover:bg-slate-50 hover:text-slate-900";
                }
            });

            if (page === '홈') renderHome();
            else if (page === '커뮤') renderCommunity();
            else if (page === '커스텀AI') renderCustomAI();
            else renderPlaceholder(page);
        }

        function renderHome() {
            const html = `
                <div class="max-w-7xl mx-auto">
                    <div class="text-center mb-12">
                        <h2 class="text-4xl font-extrabold text-slate-900 mb-4 tracking-tight">AI 투자 대가의 도서관</h2>
                        <p class="text-slate-500 text-lg">세계적인 투자 거물들의 철학을 학습한 AI 봇에게 전략을 물어보세요.</p>
                    </div>
                    <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-8">
                        ${masterBots.map(bot => `
                            <div onclick="openBotModal(${bot.id})" class="group cursor-pointer">
                                <div class="relative aspect-[3/4] ${bot.color} rounded-xl shadow-lg transform transition-all duration-300 group-hover:-translate-y-2 group-hover:shadow-2xl flex flex-col p-6 text-white overflow-hidden">
                                    <div class="absolute top-0 right-0 w-24 h-24 bg-white/10 rounded-full -mr-12 -mt-12 transition-transform group-hover:scale-150 duration-500"></div>
                                    <div class="mb-auto">
                                        <span class="text-[10px] font-bold tracking-[0.2em] opacity-70 uppercase">Master Series</span>
                                        <h3 class="text-xl font-bold leading-tight mt-1">${bot.name}</h3>
                                    </div>
                                    <div class="mt-auto">
                                        <p class="text-xs font-medium opacity-90 border-t border-white/20 pt-2">${bot.philosophy}</p>
                                    </div>
                                </div>
                                <div class="mt-4 text-center">
                                    <span class="text-[10px] font-semibold text-slate-400 group-hover:text-indigo-600 transition-colors uppercase tracking-widest">Read Insight</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            document.getElementById('content').innerHTML = html;
            lucide.createIcons();
        }

        function openBotModal(id) {
            const bot = masterBots.find(b => b.id === id);
            const modal = document.getElementById('modal');
            const modalContent = document.getElementById('modal-content');
            modalContent.innerHTML = `
                <div class="w-24 h-32 ${bot.color} rounded-xl mb-6 mx-auto shadow-xl"></div>
                <h3 class="text-2xl font-bold text-slate-900 text-center mb-2">${bot.name}</h3>
                <p class="text-indigo-600 text-center font-bold mb-4">${bot.philosophy}</p>
                <p class="text-slate-500 text-center leading-relaxed mb-10">${bot.description}</p>
                <button class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold hover:bg-indigo-700 shadow-lg shadow-indigo-100 transition-all">
                    대화 시작하기
                </button>
            `;
            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function renderCommunity() {
            const html = `
                <div class="max-w-7xl mx-auto">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-4 mb-10">
                        <div>
                            <h2 class="text-3xl font-bold text-slate-900 mb-2">커뮤니티 & 마켓</h2>
                            <p class="text-slate-500">사용자들이 제작한 AI 봇을 검증하고 투표를 통해 신뢰도를 결정하세요.</p>
                        </div>
                        <button class="bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold text-sm flex items-center gap-2 hover:bg-indigo-700 transition-all">
                            <i data-lucide="plus-circle" class="w-4 h-4"></i> 새로운 봇 제안하기
                        </button>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        ${marketBots.map(bot => `
                            <div class="bg-white border border-slate-200 rounded-3xl overflow-hidden hover:shadow-xl transition-all flex flex-col group">
                                <div class="p-8">
                                    <div class="flex justify-between items-start mb-6">
                                        <span class="bg-indigo-50 text-indigo-600 px-3 py-1 rounded-full text-[11px] font-bold uppercase tracking-wider">${bot.category}</span>
                                        <div class="flex items-center gap-1 text-xs font-bold px-2.5 py-1 rounded-lg border ${bot.yield.startsWith('+') ? 'text-emerald-600 border-emerald-100 bg-emerald-50' : 'text-rose-600 border-rose-100 bg-rose-50'}">
                                            계좌인증 ${bot.yield}
                                        </div>
                                    </div>
                                    <h4 class="text-xl font-bold text-slate-900 mb-2 group-hover:text-indigo-600 transition-colors">${bot.title}</h4>
                                    <div class="flex items-center gap-2 mb-8">
                                        <div class="w-6 h-6 rounded-full bg-slate-100 flex items-center justify-center text-[10px] text-slate-400">👤</div>
                                        <span class="text-sm text-slate-500">${bot.creator}</span>
                                    </div>
                                    <div class="bg-slate-50 rounded-2xl p-6 space-y-4">
                                        <div class="flex items-center justify-between"><span class="text-sm font-bold text-slate-500">커뮤니티 신뢰도</span><span class="text-sm font-black text-indigo-600">${bot.sentiment}%</span></div>
                                        <div class="w-full bg-slate-200 h-2 rounded-full overflow-hidden"><div class="bg-indigo-500 h-full" style="width: ${bot.sentiment}%"></div></div>
                                        <div class="flex gap-3">
                                            <button class="flex-1 bg-white border border-slate-200 hover:border-indigo-500 hover:text-indigo-600 text-slate-600 py-3 rounded-xl text-sm font-bold shadow-sm">호감</button>
                                            <button class="flex-1 bg-white border border-slate-200 hover:border-rose-500 hover:text-rose-600 text-slate-600 py-3 rounded-xl text-sm font-bold shadow-sm">불호</button>
                                        </div>
                                    </div>
                                </div>
                                <div class="px-8 py-4 bg-slate-50 border-t border-slate-100 flex justify-between items-center text-sm font-bold">
                                    <div class="text-slate-400 uppercase text-[10px]">Price</div>
                                    <div class="text-indigo-600">${bot.price}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            document.getElementById('content').innerHTML = html;
            lucide.createIcons();
        }

        function renderCustomAI() {
            const html = `
                <div class="max-w-4xl mx-auto py-12">
                    <div class="bg-white rounded-[40px] border border-slate-100 p-12 shadow-2xl relative overflow-hidden">
                        <div class="absolute -top-24 -right-24 w-64 h-64 bg-indigo-50 rounded-full opacity-50"></div>
                        <div class="relative z-10">
                            <h2 class="text-3xl font-black text-slate-900 mb-2">나만의 투자봇 빌더</h2>
                            <p class="text-slate-500 mb-12 text-lg">당신의 매매 데이터를 학습시켜 독보적인 AI를 만들어보세요.</p>
                            <div class="space-y-8">
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div class="space-y-2">
                                        <label class="text-sm font-bold text-slate-700 ml-1">봇 이름</label>
                                        <input class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="예: 무적의 단타마스터">
                                    </div>
                                    <div class="space-y-2">
                                        <label class="text-sm font-bold text-slate-700 ml-1">증권사 연동</label>
                                        <div class="w-full p-4 bg-indigo-50 border border-indigo-100 text-indigo-600 rounded-2xl flex justify-between items-center cursor-pointer font-bold">
                                            연결됨: 한국투자증권 <i data-lucide="check-circle-2" class="w-4 h-4"></i>
                                        </div>
                                    </div>
                                </div>
                                <div class="p-8 bg-slate-50 rounded-3xl space-y-6">
                                    <h3 class="font-bold text-slate-800 flex items-center gap-2">학습 가이드 설정</h3>
                                    <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
                                        <button class="p-4 rounded-2xl border bg-white border-slate-200 text-slate-600 font-bold text-sm hover:border-indigo-400">공격적</button>
                                        <button class="p-4 rounded-2xl border bg-indigo-600 text-white border-indigo-600 font-bold text-sm shadow-md shadow-indigo-100">방어적</button>
                                        <button class="p-4 rounded-2xl border bg-white border-slate-200 text-slate-600 font-bold text-sm hover:border-indigo-400">추세추종</button>
                                        <button class="p-4 rounded-2xl border bg-white border-slate-200 text-slate-600 font-bold text-sm hover:border-indigo-400">역배열</button>
                                    </div>
                                </div>
                                <button class="w-full bg-slate-900 text-white py-5 rounded-[20px] font-bold text-xl hover:bg-slate-800 transition-all shadow-xl shadow-slate-200 flex items-center justify-center gap-3">
                                    학습 및 생성 시작 <i data-lucide="chevron-right" class="w-6 h-6"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('content').innerHTML = html;
            lucide.createIcons();
        }

        function renderPlaceholder(page) {
            document.getElementById('content').innerHTML = `
                <div class="flex flex-col items-center justify-center py-32 opacity-40">
                    <i data-lucide="filter" class="w-16 h-16 mb-4 text-slate-300"></i>
                    <h3 class="text-2xl font-bold">${page} 페이지 준비 중</h3>
                    <p class="mt-2 text-slate-500">곧 혁신적인 ${page} 기능을 만나보실 수 있습니다.</p>
                </div>
            `;
            lucide.createIcons();
        }

        // 초기 로드
        window.onload = () => {
            navigate('홈');
            lucide.createIcons();
        };
    </script>
</body>
</html>
