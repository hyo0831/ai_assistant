<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORION AI - William O'Neil Bot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { animation: spin 1s linear infinite; border: 3px solid #e2e8f0; border-top-color: #6366f1; border-radius: 50%; width: 40px; height: 40px; }
        .markdown-body h2 { font-size: 1.25rem; font-weight: 800; margin-top: 1.5rem; margin-bottom: 0.5rem; color: #1e293b; }
        .markdown-body h3 { font-size: 1.1rem; font-weight: 700; margin-top: 1rem; color: #334155; }
        .markdown-body p { margin-bottom: 0.5rem; line-height: 1.7; color: #475569; }
        .markdown-body ul { list-style: disc; padding-left: 1.5rem; margin-bottom: 0.5rem; }
        .markdown-body li { margin-bottom: 0.25rem; color: #475569; }
        .markdown-body strong { color: #1e293b; }
        .markdown-body hr { margin: 1rem 0; border-color: #e2e8f0; }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <div id="root"></div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const API_BASE = (window.location.port === '3000' || window.location.port === '3001')
            ? 'http://localhost:8000'
            : window.location.origin;

        const Icon = ({ name, className }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current) {
                    ref.current.innerHTML = `<i data-lucide="${name}" class="${className || ''}"></i>`;
                    lucide.createIcons({ targets: ref.current.querySelectorAll('[data-lucide]') });
                }
            }, [name, className]);
            return <span ref={ref}></span>;
        };

        // CAN SLIM 스코어카드
        const CANSLIMScorecard = ({ summary }) => {
            if (!summary) return null;
            const fmt = (v, suffix='') => v != null ? (typeof v === 'number' ? v.toFixed(1) + suffix : v + suffix) : 'N/A';
            const factors = [
                { key: 'C', label: '분기 실적 (Current Earnings)', getValue: () => {
                    const c = summary.C;
                    if (!c) return 'N/A';
                    const parts = [];
                    if (c.quarter) parts.push(c.quarter);
                    parts.push(`EPS YoY: ${fmt(c.eps_yoy, '%')}`);
                    if (c.revenue_yoy != null) parts.push(`매출: ${fmt(c.revenue_yoy, '%')}`);
                    if (c.acceleration) parts.push(c.acceleration);
                    return parts.join(' | ');
                }},
                { key: 'A', label: '연간 실적 (Annual Earnings)', getValue: () => {
                    const a = summary.A;
                    if (!a) return 'N/A';
                    const parts = [];
                    if (a.eps_yoy != null) parts.push(`YoY: ${fmt(a.eps_yoy, '%')}`);
                    if (a.roe != null) parts.push(`ROE: ${fmt(a.roe, '%')}`);
                    if (a.consecutive_years) parts.push(`${a.consecutive_years}년 연속 성장`);
                    if (a.pe_ratio != null) parts.push(`P/E: ${a.pe_ratio}`);
                    return parts.length > 0 ? parts.join(' | ') : 'N/A';
                }},
                { key: 'N', label: '신촉매 (New Product)', getValue: () => {
                    const n = summary.N;
                    return n ? `촉매 ${n.catalyst_count}건 | 52W고가: ${n.near_52w_high ? 'Yes' : 'No'}` : 'N/A';
                }},
                { key: 'S', label: '수급 (Supply & Demand)', getValue: () => {
                    const s = summary.S;
                    return s ? `${s.market_cap_label || 'N/A'} | D/E: ${s.debt_to_equity != null ? s.debt_to_equity+'%' : 'N/A'}` : 'N/A';
                }},
                { key: 'L', label: '주도주 (Leader/Laggard)', getValue: () => {
                    const l = summary.L;
                    return l ? `RS: ${l.rs_rating != null ? l.rs_rating+'/99' : 'N/A'} | ${l.rs_trend || ''}` : 'N/A';
                }},
                { key: 'I', label: '기관 보유 (Institutional)', getValue: () => {
                    const i = summary.I;
                    return i ? `보유율: ${i.inst_pct != null ? i.inst_pct+'%' : 'N/A'}` : 'N/A';
                }},
                { key: 'M', label: '시장 방향 (Market)', getValue: () => {
                    const m = summary.M;
                    if (!m) return 'N/A';
                    const keys = Object.keys(m);
                    if (keys.length === 0) return 'N/A';
                    return keys.map(k => `${k.toUpperCase()}: ${m[k].trend}`).join(' | ');
                }},
            ];

            return (
                <div className="space-y-3">
                    {factors.map(f => (
                        <div key={f.key} className="flex items-center gap-4 p-3 hover:bg-slate-50 rounded-lg transition-colors">
                            <div className="w-8 h-8 bg-indigo-100 text-indigo-700 rounded-lg flex items-center justify-center font-black text-sm shrink-0">{f.key}</div>
                            <div className="flex-1 min-w-0">
                                <div className="text-xs font-bold text-slate-400 mb-0.5">{f.label}</div>
                                <div className="text-sm font-medium text-slate-700">{f.getValue()}</div>
                            </div>
                        </div>
                    ))}
                </div>
            );
        };

        const App = () => {
            const [mode, setMode] = useState('analysis');
            const [ticker, setTicker] = useState('');
            const [loading, setLoading] = useState(false);
            const [analysisResult, setAnalysisResult] = useState(null);
            const [tradingResult, setTradingResult] = useState(null);
            const [error, setError] = useState('');

            const autoStarted = useRef(false);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const t = params.get('ticker');
                const m = params.get('mode');
                const auto = params.get('autostart');
                if (t) setTicker(t);
                if (m === 'trading' || m === 'analysis') setMode(m);
                if (t && auto === 'true' && !autoStarted.current) {
                    autoStarted.current = true;
                    const finalMode = m || 'analysis';
                    console.log('[AutoStart] ticker:', t, 'mode:', finalMode);
                    // Use a microtask to ensure state is set before calling
                    Promise.resolve().then(() => {
                        if (finalMode === 'analysis') {
                            runAnalysisFor(t.toUpperCase());
                        } else {
                            runTradingFor(t.toUpperCase());
                        }
                    });
                }
            }, []);

            const runAnalysisFor = async (t) => {
                const target = t || ticker.trim().toUpperCase();
                if (!target) { setError('종목 코드를 입력해주세요.'); return; }
                setLoading(true); setError(''); setAnalysisResult(null); setTradingResult(null);
                console.log('[API] POST /api/analysis/analyze', { ticker: target });
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 240000);
                    const res = await fetch(`${API_BASE}/api/analysis/analyze`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ ticker: target }),
                        signal: controller.signal
                    });
                    clearTimeout(timeoutId);
                    console.log('[API] Response status:', res.status);
                    if (!res.ok) {
                        let errMsg = '분석 실패';
                        try { const err = await res.json(); errMsg = err.detail || errMsg; } catch(e) {}
                        throw new Error(errMsg);
                    }
                    const data = await res.json();
                    console.log('[API] Analysis result received');
                    setAnalysisResult(data);
                } catch (e) {
                    console.error('[API] Error:', e);
                    if (e.name === 'AbortError') {
                        setError('분석 시간이 초과되었습니다 (4분). 다시 시도해 주세요.');
                    } else {
                        setError(e.message || '알 수 없는 오류가 발생했습니다.');
                    }
                } finally {
                    setLoading(false);
                }
            };

            const runTradingFor = async (t) => {
                const target = t || ticker.trim().toUpperCase();
                if (!target) { setError('종목 코드를 입력해주세요.'); return; }
                setLoading(true); setError(''); setTradingResult(null); setAnalysisResult(null);
                console.log('[API] POST /api/trading/analyze', { ticker: target });
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 240000);
                    const res = await fetch(`${API_BASE}/api/trading/analyze`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ ticker: target, mode: 'v2', interval: '1wk' }),
                        signal: controller.signal
                    });
                    clearTimeout(timeoutId);
                    console.log('[API] Response status:', res.status);
                    if (!res.ok) {
                        let errMsg = '분석 실패';
                        try { const err = await res.json(); errMsg = err.detail || errMsg; } catch(e) {}
                        throw new Error(errMsg);
                    }
                    const data = await res.json();
                    console.log('[API] Trading result received');
                    setTradingResult(data);
                } catch (e) {
                    console.error('[API] Error:', e);
                    if (e.name === 'AbortError') {
                        setError('분석 시간이 초과되었습니다 (4분). 다시 시도해 주세요.');
                    } else {
                        setError(e.message || '알 수 없는 오류가 발생했습니다.');
                    }
                } finally {
                    setLoading(false);
                }
            };

            const runAnalysis = () => runAnalysisFor();
            const runTrading = () => runTradingFor();

            const handleSubmit = () => {
                if (mode === 'analysis') runAnalysis();
                else runTrading();
            };

            // 검색 자동완성
            const [searchResults, setSearchResults] = useState([]);
            const [showDropdown, setShowDropdown] = useState(false);
            const searchTimerRef = useRef(null);
            const dropdownRef = useRef(null);

            const onTickerInput = (val) => {
                setTicker(val.toUpperCase());
                clearTimeout(searchTimerRef.current);
                if (val.trim().length < 1) { setShowDropdown(false); return; }
                searchTimerRef.current = setTimeout(async () => {
                    try {
                        const res = await fetch(`${API_BASE}/api/search?q=${encodeURIComponent(val.trim())}`);
                        const data = await res.json();
                        setSearchResults(data.results || []);
                        setShowDropdown((data.results || []).length > 0);
                    } catch(e) { setShowDropdown(false); }
                }, 250);
            };

            const selectResult = (symbol) => {
                setTicker(symbol);
                setShowDropdown(false);
            };

            useEffect(() => {
                const handler = (e) => {
                    if (dropdownRef.current && !dropdownRef.current.contains(e.target)) setShowDropdown(false);
                };
                document.addEventListener('click', handler);
                return () => document.removeEventListener('click', handler);
            }, []);

            const renderMarkdown = (text) => {
                if (typeof marked !== 'undefined' && marked.parse) {
                    return { __html: marked.parse(text || '') };
                }
                return { __html: (text || '').replace(/\n/g, '<br/>') };
            };

            return (
                <div className="min-h-screen bg-[#F8FAFC] text-slate-900">
                    {/* Header */}
                    <header className="sticky top-0 z-50 bg-white border-b border-slate-200 h-16 flex items-center justify-between px-6">
                        <div className="flex items-center gap-4">
                            <a href="/" className="flex items-center gap-2 hover:opacity-80 transition-opacity">
                                <div className="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center shadow-md shadow-indigo-100">
                                    <Icon name="target" className="text-white w-5 h-5" />
                                </div>
                                <span className="text-xl font-black text-slate-900 tracking-tighter">ORION AI</span>
                            </a>
                            <div className="hidden md:block ml-4">
                                <span className="text-lg font-bold text-slate-700">William O'Neil Bot</span>
                                <span className="bg-emerald-100 text-emerald-600 text-[10px] px-2 py-0.5 rounded-full font-bold ml-2">LIVE</span>
                            </div>
                        </div>
                        <div className="flex bg-slate-100 p-1.5 rounded-2xl border border-slate-200 shadow-inner">
                            <button onClick={() => setMode('trading')} className={`px-5 py-2 rounded-xl text-xs font-bold transition-all flex items-center gap-2 ${mode === 'trading' ? 'bg-white text-slate-900 shadow-md border border-slate-200' : 'text-slate-400'}`}>
                                <Icon name="line-chart" className="w-4 h-4"/> 트레이딩 모드
                            </button>
                            <button onClick={() => setMode('analysis')} className={`px-5 py-2 rounded-xl text-xs font-bold transition-all flex items-center gap-2 ${mode === 'analysis' ? 'bg-white text-indigo-600 shadow-md border border-slate-200' : 'text-slate-400'}`}>
                                <Icon name="file-text" className="w-4 h-4"/> 분석 모드
                            </button>
                        </div>
                    </header>

                    {/* Search Bar */}
                    <div className="bg-white border-b border-slate-100 px-6 py-4">
                        <div className="max-w-4xl mx-auto flex gap-3">
                            <div className="flex-1 relative" ref={dropdownRef}>
                                <input
                                    type="text"
                                    value={ticker}
                                    onChange={e => onTickerInput(e.target.value)}
                                    onKeyDown={e => { if (e.key === 'Enter') { setShowDropdown(false); handleSubmit(); } if (e.key === 'Escape') setShowDropdown(false); }}
                                    onFocus={e => { if (ticker.length >= 1) onTickerInput(ticker); }}
                                    placeholder="종목명 또는 티커 검색 (예: 삼성전자, Apple, NVDA)"
                                    className="w-full border border-slate-200 rounded-xl px-5 py-3 text-sm font-bold outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 transition-all"
                                    autoComplete="off"
                                />
                                {showDropdown && searchResults.length > 0 && (
                                    <div className="absolute top-full left-0 right-0 mt-1 bg-white rounded-xl border border-slate-200 shadow-xl z-50 max-h-64 overflow-y-auto">
                                        {searchResults.map((item, i) => (
                                            <div key={item.symbol}
                                                className="flex items-center gap-3 px-4 py-3 cursor-pointer hover:bg-indigo-50 transition-colors"
                                                onClick={() => selectResult(item.symbol)}>
                                                <div className="w-8 h-8 bg-slate-100 rounded-lg flex items-center justify-center shrink-0">
                                                    <span className="text-[10px] font-black text-slate-500">{item.type === 'ETF' ? 'ETF' : (item.exchange || '').substring(0,3)}</span>
                                                </div>
                                                <div className="flex-1 min-w-0">
                                                    <div className="text-sm font-bold text-slate-900 truncate">{item.symbol}</div>
                                                    <div className="text-xs text-slate-400 truncate">{item.name}</div>
                                                </div>
                                                <span className="text-[10px] text-slate-300 shrink-0">{item.exchange}</span>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                            <button
                                onClick={handleSubmit}
                                disabled={loading}
                                className="bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold text-sm hover:bg-indigo-700 transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2 shadow-lg shadow-indigo-100 shrink-0"
                            >
                                {loading ? <><div className="spinner" style={{width:16,height:16,borderWidth:2}}></div> 분석 중...</> : <><Icon name="search" className="w-4 h-4"/> 분석 시작</>}
                            </button>
                        </div>
                        {error && <div className="max-w-4xl mx-auto mt-3 text-rose-600 text-sm font-bold bg-rose-50 px-4 py-2 rounded-lg">{error}</div>}
                    </div>

                    {/* Main Content */}
                    <main className="p-6">
                        {loading && (
                            <div className="flex flex-col items-center justify-center py-32">
                                <div className="spinner mb-4"></div>
                                <p className="text-slate-500 font-bold">
                                    {mode === 'analysis' ? 'CAN SLIM 펀더멘털 데이터 수집 + AI 분석 중...' : '차트 패턴 + CAN SLIM 분석 중...'}
                                </p>
                                <p className="text-slate-400 text-sm mt-1">최대 1-2분 소요될 수 있습니다.</p>
                            </div>
                        )}

                        {!loading && !analysisResult && !tradingResult && !error && (
                            <div className="flex flex-col items-center justify-center py-32 opacity-40">
                                <Icon name={mode === 'analysis' ? 'bar-chart-2' : 'line-chart'} className="w-16 h-16 text-slate-300 mb-4" />
                                <h3 className="text-2xl font-bold text-slate-400">
                                    {mode === 'analysis' ? '종목을 입력하여 CAN SLIM 펀더멘털 분석을 시작하세요' : '종목을 입력하여 트레이딩 차트 분석을 시작하세요'}
                                </h3>
                            </div>
                        )}

                        {/* 분석 모드 결과 */}
                        {!loading && mode === 'analysis' && analysisResult && (
                            <div className="max-w-6xl mx-auto animate-in">
                                <div className="bg-white rounded-[32px] p-8 border border-slate-200 shadow-sm mb-6">
                                    <div className="flex items-center justify-between mb-6 pb-6 border-b border-slate-100">
                                        <div>
                                            <h2 className="text-3xl font-black text-slate-900 tracking-tight">{analysisResult.company_name || analysisResult.ticker}</h2>
                                            <span className="text-sm font-bold text-slate-400">{analysisResult.ticker} | {analysisResult.currency}</span>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-12 gap-6">
                                        {/* CAN SLIM 스코어카드 */}
                                        <div className="col-span-4">
                                            <div className="bg-slate-50 rounded-2xl p-6 border border-slate-100">
                                                <h3 className="font-black text-lg text-slate-900 mb-4 flex items-center gap-2">
                                                    <Icon name="clipboard-check" className="w-5 h-5 text-indigo-600"/> CAN SLIM 요약
                                                </h3>
                                                <CANSLIMScorecard summary={analysisResult.summary} />
                                            </div>
                                        </div>

                                        {/* AI 분석 결과 */}
                                        <div className="col-span-8">
                                            <div className="bg-slate-50 rounded-2xl p-6 border border-slate-100">
                                                <h3 className="font-black text-lg text-slate-900 mb-4 flex items-center gap-2">
                                                    <Icon name="bot" className="w-5 h-5 text-indigo-600"/> AI 분석 보고서
                                                </h3>
                                                <div className="markdown-body text-sm leading-relaxed" dangerouslySetInnerHTML={renderMarkdown(analysisResult.ai_analysis)} />
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 트레이딩 모드 결과 */}
                        {!loading && mode === 'trading' && tradingResult && (
                            <div className="max-w-6xl mx-auto animate-in">
                                <div className="bg-white rounded-[32px] p-8 border border-slate-200 shadow-sm mb-6">
                                    <div className="flex items-center justify-between mb-6 pb-6 border-b border-slate-100">
                                        <h2 className="text-3xl font-black text-slate-900">{tradingResult.ticker} — 트레이딩 분석</h2>
                                        <span className="text-sm text-slate-400">{tradingResult.mode.toUpperCase()} 모드</span>
                                    </div>

                                    {/* 차트 이미지 */}
                                    {tradingResult.chart_base64 && (
                                        <div className="mb-6 bg-slate-900 rounded-2xl p-4 flex items-center justify-center">
                                            <img src={tradingResult.chart_base64} alt="O'Neil Chart" className="max-w-full rounded-lg" />
                                        </div>
                                    )}

                                    {/* 패턴 데이터 */}
                                    {tradingResult.pattern_data && (
                                        <div className="grid grid-cols-4 gap-4 mb-6">
                                            <div className="bg-slate-50 rounded-xl p-4 text-center border border-slate-100">
                                                <div className="text-xs font-bold text-slate-400 mb-1">패턴</div>
                                                <div className="font-black text-slate-900">{tradingResult.pattern_data.best_pattern?.name || 'None'}</div>
                                            </div>
                                            <div className="bg-slate-50 rounded-xl p-4 text-center border border-slate-100">
                                                <div className="text-xs font-bold text-slate-400 mb-1">RS Rating</div>
                                                <div className="font-black text-slate-900">{tradingResult.pattern_data.rs_analysis?.rs_rating || 'N/A'}/99</div>
                                            </div>
                                            <div className="bg-slate-50 rounded-xl p-4 text-center border border-slate-100">
                                                <div className="text-xs font-bold text-slate-400 mb-1">Volume Trend</div>
                                                <div className="font-black text-slate-900">{tradingResult.pattern_data.volume_analysis?.recent_volume_trend || 'N/A'}</div>
                                            </div>
                                            <div className="bg-slate-50 rounded-xl p-4 text-center border border-slate-100">
                                                <div className="text-xs font-bold text-slate-400 mb-1">결함</div>
                                                <div className="font-black text-slate-900">{tradingResult.pattern_data.pattern_faults?.length || 0}개</div>
                                            </div>
                                        </div>
                                    )}

                                    {/* AI 분석 */}
                                    <div className="bg-slate-50 rounded-2xl p-6 border border-slate-100">
                                        <h3 className="font-black text-lg text-slate-900 mb-4">AI 분석 보고서</h3>
                                        <div className="markdown-body text-sm" dangerouslySetInnerHTML={renderMarkdown(tradingResult.analysis)} />
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
